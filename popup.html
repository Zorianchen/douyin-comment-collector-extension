<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Douyin Comment Collector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <header class="header">
      <div>
        <h1>抖音采集</h1>
        <p id="pageHint">正在检测当前页面</p>
      </div>
      <span id="statusBadge" class="badge">待机</span>
    </header>

    <section class="stats" aria-live="polite">
      <div>
        <span class="label">评论</span>
        <strong id="count">0</strong>
      </div>
      <div>
        <span class="label">状态</span>
        <strong id="statusText">Ready</strong>
      </div>
    </section>

    <section class="section">
      <h2 class="sectionTitle">评论采集</h2>
      <div class="config">
        <label>
          <span>采集模式</span>
          <select id="collectMode">
            <option value="limit">采指定条数</option>
            <option value="all">采全部评论</option>
          </select>
        </label>
        <label id="maxCommentsField">
          <span>目标条数</span>
          <input id="maxComments" type="number" min="1" max="10000" step="1" value="2000">
        </label>
        <label>
          <span>滚动间隔，毫秒</span>
          <input id="delayMs" type="number" min="500" max="15000" step="100" value="2000">
        </label>
        <label class="checkline">
          <input id="collectReplies" type="checkbox" checked>
          <span>采集二级回复，自动展开</span>
        </label>
        <label class="checkline">
          <input id="expandText" type="checkbox" checked>
          <span>展开长评论文本（解决 ... 截断）</span>
        </label>
      </div>

      <div class="actions actions-2">
        <button id="startBtn" class="primary">开始采集</button>
        <button id="stopBtn">停止</button>
      </div>

      <div class="actions actions-2">
        <button id="dedupeBtn">去重</button>
        <button id="clearBtn" class="danger">清空</button>
      </div>

      <div class="actions actions-2">
        <button id="exportCsvBtn">导出 CSV</button>
        <button id="exportJsonBtn">导出 JSON</button>
      </div>
    </section>

    <p id="message" class="message">提示：建议直接在抖音页面右下角的悬浮面板操作，更直观。打开评论区后点「开始采集」。</p>
  </main>
  <script src="exporter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
